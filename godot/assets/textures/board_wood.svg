    <radialGradient id="topLight" cx="48%" cy="30%" r="64%">
      <stop offset="0%" stop-color="#f4dcc0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f4dcc0" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#c8a279" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#2f2014" stop-opacity="0.0"/>
    </radialGradient>
