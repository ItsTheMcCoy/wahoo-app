<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8f6b48"/>
      <stop offset="52%" stop-color="#7a593b"/>
      <stop offset="100%" stop-color="#694b31"/>
    </linearGradient>
    <linearGradient id="edgeTone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c1c10" stop-opacity="0.34"/>
      <stop offset="50%" stop-color="#2c1c10" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#2c1c10" stop-opacity="0.30"/>
    </linearGradient>
    <pattern id="grain" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M0,12 C16,2 48,20 64,10" fill="none" stroke="#4a341f" stroke-opacity="0.26" stroke-width="2"/>
      <path d="M0,28 C18,38 46,18 64,30" fill="none" stroke="#d6bc9b" stroke-opacity="0.18" stroke-width="2"/>
      <path d="M0,46 C24,34 42,58 64,44" fill="none" stroke="#4a341f" stroke-opacity="0.20" stroke-width="2"/>
      <path d="M0,60 C24,68 44,52 64,62" fill="none" stroke="#d6bc9b" stroke-opacity="0.16" stroke-width="2"/>
    </pattern>
    <pattern id="grainFine" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M0,8 C15,2 34,14 48,8" fill="none" stroke="#4d3723" stroke-opacity="0.14" stroke-width="1.5"/>
      <path d="M0,20 C14,27 34,16 48,22" fill="none" stroke="#d9c1a2" stroke-opacity="0.10" stroke-width="1.5"/>
      <path d="M0,36 C16,30 32,44 48,35" fill="none" stroke="#4d3723" stroke-opacity="0.12" stroke-width="1.5"/>
    </pattern>
    <filter id="softBlur" x="-10%" y="-10%" width="120%" height="120%">
